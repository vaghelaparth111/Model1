<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body{
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #f2f2f2;
        }

        form{
            background: white;
            padding: 30px;
            width: 350px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        h1{
            text-align: center;
            margin-bottom: 20px;
            color: #333;
        }

        label{
            font-weight: bold;
            color: #555;
        }

        input{
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border: 1px solid #ccc;
            border-radius: 5px;
            outline: none;
        }

        input:focus{
            border-color: #007bff;
        }

        button{
            width: 100%;
            padding: 10px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover{
            background: #0056b3;
        }

        p{
            margin-top: 15px;
            text-align: center;
        }

        a{
            text-decoration: none;
            color: #007bff;
        }

        a:hover{
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <form>
        <h1>Login Form</h1>
        <label>Username : </label>
        <input type="text" required placeholder="Enter username"><br><br>
        <label>Email : </label>
        <input type="text" required placeholder="Enter Email"><br><br>
        <button type="submit">Login here</button>
        <p>Don't have account! <a href="#">Register Here...</a></p>
    </form>
</body>
</html>
