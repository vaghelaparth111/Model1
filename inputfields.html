<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Input Fields</title>
</head>

<body>
    <h1>All Input Fields</h1>
    <form>
        <label>Username : </label>
        <input type="text" placeholder="Enter username" required><br><br>

        <label>Password : </label>
        <input type="password" placeholder="Enter password" required><br><br>

        <label>Email : </label>
        <input type="email" placeholder="Enter email" required><br><br>

        <label>Age : </label>
        <input type="number" placeholder="Enter age" required><br><br>

        <label>Phone : </label>
        <input type="tel" placeholder="Enter phone number" required><br><br>

        <label>Website URL :</label>
        <input type="url" placeholder="Enter website URL" required><br><br>

        <label>Search : </label>
        <input type="search" placeholder="Search here" required><br><br>

        <label>Select Date & time:</label>
        <input type="datetime-local" required><br><br>

        <label>Choose Color:</label>
        <input type="color" required><br><br>

        <label>Volume:</label>
        <input type="range" min="0" max="100" required><br><br>

        <label>Upload File:</label>
        <input type="file"><br><br>
        
        <label>Gender:</label>
        <input type="radio" name="gender"> Male
        <input type="radio" name="gender"> Female
        <br><br>
        
        <label>Message:</label><br>
        <textarea rows="4" cols="30" placeholder="Enter message" required></textarea><br><br>
        
        <label>Select Skills : </label>
        <select>
            <option>Select</option>
            <option>HTML</option>
            <option>CSS</option>
            <option>JavaScript</option>
        </select><br><br>
        
        <label>
            <input type="checkbox" required>
            Accept Terms & Conditions
        </label><br><br>
        
        <input type="submit" value="Submit"><br><br>
        
        <input type="reset" value="Reset"><br><br>
    </form>
    
    
</body>

</html>
