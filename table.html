<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table Web Page</title>
    <Style>
        body{
            display: flex;
            height: 100vh;
            justify-content: center;
            align-items: center;
        }
        table{
            width: 70%;
            height: 400px;
            text-align: center;
        }
    </Style>
</head>
<body>
    <table border="5px">
        <tr>
            <td>A</td>
            <td colspan="6">B</td>           
        </tr>
        
        <tr>
            <td>C</td>
            <td>D</td>
            <td>E</td>
            <td>F</td>
            <td>G</td>
            <td>H</td>
            <td rowspan="3">I</td>         
        </tr>
        
        <tr>
            <td rowspan="2">J</td>
            <td>K</td>
            <td colspan="2">L</td>
            <td colspan="2">M</td>          
        </tr>
        
        <tr>
            <td>N</td>
            <td>O</td>
            <td>P</td>
            <td>Q</td>
            <td>R</td>           
        </tr>
    </table>
</body>
</html>
