<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Static Website</title>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script>
        $(function () {
            $("#header").load("header.html");
            $("#footer").load("footer.html");
        });
    </script>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="header"> </div>


    <main>
        <section class="slider">
            <div class="slide">
                <div slide="1" class="slide-content">
                    <img src="images/slide1.jpg" alt="Placeholder Image">
                </div>
                <div slide="2" class="slide-content">
                    <img src="images/slide2.jpg" alt="Placeholder Image">
                </div>
                <div slide="3" class="slide-content">
                    <img src="images/slide3.jpg" alt="Placeholder Image">
                </div>
            </div>
            <div class="navigation">
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
            </div>
        </section>
    </main>


    <div id="footer"></div>
</body>

</html>
