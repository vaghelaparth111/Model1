<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Footer</title>
    <style>
    .footer,a{
        display: flex;
        justify-content: space-evenly;
        background-color: #690000;
        color: white;
        text-decoration: none;
    }
    .footer ul{
        justify-content: left;
        padding: 0;
    }

    .footer ul li{
        list-style: none;
        margin: 10px 0;
    }
    footer p{
        text-align: center;
        background-color: #690000;
        color: white;
        margin: 0;
        padding: 10px 0;
    }

    </style>
</head>
<body>
    <footer>
        <section class="footer">
            <div class="about">
                <h2>About Us</h2>
                <ul>
                    <li><a href="#">Our Story</a></li>
                    <li><a href="#">Team</a></li>
                    <li><a href="#">Careers</a></li>
                </ul>
            </div>
            <div class="Logo">
                <img src="images/logo.png" alt="Simple Logo">
            </div>
            <div class="social">
                <h2>Follow Us</h2>
                <ul>
                    <li><a href="#">Facebook</a></li>
                    <li><a href="#">Twitter</a></li>
                    <li><a href="#">Instagram</a></li>
                </ul>
            </div>
        </section>
        <p>&copy; 2026 Simple. All rights reserved.</p>
    </footer>
</body>
</html>
